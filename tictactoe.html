<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      letter-spacing: 4px;
      margin-bottom: 1.5rem;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5em;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell.taken { cursor: default; }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      border-color: #e94560;
      animation: pulse 0.6s ease;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    #reset {
      margin-top: 1.8rem;
      padding: 0.7rem 2.2rem;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 1px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    #reset:hover { background: #c73652; transform: scale(1.04); }

    #score {
      display: flex;
      gap: 2.5rem;
      margin-top: 1.5rem;
      font-size: 0.95rem;
      color: #888;
    }

    #score span { font-weight: 700; color: #eee; }
  </style>
</head>
<body>
  <h1>TIC TAC TOE</h1>
  <div id="status">X's turn</div>
  <div id="board"></div>
  <button id="reset">New Game</button>
  <div id="score">
    <div>X Wins: <span id="xwins">0</span></div>
    <div>Draws: <span id="draws">0</span></div>
    <div>O Wins: <span id="owins">0</span></div>
  </div>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    let board, current, over, scores = {X:0, O:0, D:0};

    function init() {
      board = Array(9).fill('');
      current = 'X';
      over = false;
      render();
      document.getElementById('status').textContent = "X's turn";
      document.querySelectorAll('.cell').forEach(c => c.classList.remove('win'));
    }

    function render() {
      const el = document.getElementById('board');
      el.innerHTML = '';
      board.forEach((v, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell' + (v ? ' taken ' + v.toLowerCase() : '');
        cell.textContent = v;
        cell.addEventListener('click', () => move(i));
        el.appendChild(cell);
      });
    }

    function move(i) {
      if (over || board[i]) return;
      board[i] = current;
      render();

      const winLine = checkWin(current);
      if (winLine) {
        winLine.forEach(idx => document.querySelectorAll('.cell')[idx].classList.add('win'));
        document.getElementById('status').textContent = `${current} wins!`;
        scores[current]++;
        updateScore();
        over = true;
        return;
      }

      if (board.every(v => v)) {
        document.getElementById('status').textContent = "It's a draw!";
        scores.D++;
        updateScore();
        over = true;
        return;
      }

      current = current === 'X' ? 'O' : 'X';
      document.getElementById('status').textContent = `${current}'s turn`;
    }

    function checkWin(player) {
      return WINS.find(line => line.every(i => board[i] === player)) || null;
    }

    function updateScore() {
      document.getElementById('xwins').textContent = scores.X;
      document.getElementById('owins').textContent = scores.O;
      document.getElementById('draws').textContent = scores.D;
    }

    document.getElementById('reset').addEventListener('click', init);
    init();
  </script>
</body>
</html>
